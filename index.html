<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NURSE ASSIST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; overflow: hidden; }
        #scroll-zone { flex: 1; overflow-y: auto; padding: 15px; }
        .card { background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; outline: none; resize: none; margin-top: 10px; }
        .orb { width: 80px; height: 80px; border-radius: 50%; background: #fff; border: none; font-size: 24px; cursor: pointer; }
        .recording { background: #ef4444 !important; box-shadow: 0 0 30px #ef4444; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="p-5 border-b border-white/10 flex justify-between items-center">
        <div onclick="logic.trigger()">
            <h1 class="text-xl font-bold italic text-blue-600 uppercase">Nurse Assist</h1>
        </div>
        <button onclick="logic.export()" class="bg-blue-600 px-4 py-2 rounded-full text-[10px] font-bold uppercase">Exporter</button>
    </header>

    <div id="scroll-zone"></div>

    <footer class="p-6 bg-zinc-950 border-t border-white/10 flex flex-col items-center gap-4">
        <div id="status" class="text-[10px] text-zinc-500 uppercase font-bold text-center">Maintenir pour dicter</div>
        <div class="flex items-center gap-8">
            <button onclick="logic.add('')" class="text-xl opacity-40">⌨️</button>
            <button id="mic" class="orb">🎤</button>
            <button id="reset-btn" onclick="logic.clear()" class="hidden text-red-500 text-[10px] font-bold border border-red-500/30 px-2 py-1 rounded">RESET</button>
        </div>
    </footer>

<script>
const DB = "nurse_v14_final";
let state = JSON.parse(localStorage.getItem(DB) || '{"notes":[]}');

const logic = {
    save() { localStorage.setItem(DB, JSON.stringify(state)); },
    add(txt) {
        state.notes.unshift({ id: Date.now(), patient: "PATIENT", text: txt, time: new Date().toLocaleTimeString() });
        this.save(); this.render();
    },
    update(id, val) {
        const n = state.notes.find(x => x.id === id);
        if(n) { n.text = val; this.save(); }
    },
    updatePatient(id, val) {
        const n = state.notes.find(x => x.id === id);
        if(n) { n.patient = val; this.save(); }
    },
    deleteNote(id) {
        if(confirm("Supprimer ?")) {
            state.notes = state.notes.filter(x => x.id !== id);
            this.save(); this.render();
        }
    },
    render() {
        const zone = document.getElementById('scroll-zone');
        zone.innerHTML = '';
        state.notes.forEach(n => {
            const div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `
                <input class="bg-blue-500/10 text-blue-400 rounded-full px-3 py-1 text-xs font-bold outline-none" value="${n.patient}" oninput="logic.updatePatient(${n.id}, this.value)">
                <textarea oninput="logic.update(${n.id}, this.value)">${n.text}</textarea>
                <div class="flex justify-between mt-2 opacity-30 text-[9px]">
                    <span>${n.time}</span>
                    <button onclick="logic.deleteNote(${n.id})" class="text-red-500 font-bold uppercase">Supprimer</button>
                </div>`;
            zone.appendChild(div);
        });
    },
    export() {
        if(!state.notes.length) return;
        const txt = state.notes.map(n => `[${n.patient}] ${n.text}`).join('\n\n');
        navigator.clipboard.writeText(txt);
        alert("Copié !");
    },
    clicks: 0,
    trigger() {
        this.clicks++;
        if(this.clicks >= 3) document.getElementById('reset-btn').classList.remove('hidden');
    },
    clear() {
        if(prompt("Tapez EFFACER") === "EFFACER") {
            state.notes = []; this.save(); this.render();
            document.getElementById('reset-btn').classList.add('hidden');
            this.clicks = 0;
        }
    }
};

let rec = null;
const API = window.SpeechRecognition || window.webkitSpeechRecognition;
if(API) {
    rec = new API(); rec.lang = 'fr-FR'; rec.interimResults = true;
    rec.onstart = () => { document.getElementById('mic').classList.add('recording'); };
    rec.onresult = (e) => { document.getElementById('status').innerText = e.results[0][0].transcript; };
    rec.onend = () => {
        document.getElementById('mic').classList.remove('recording');
        const txt = document.getElementById('status').innerText;
        if(txt.length > 2 && txt !== "Maintenir pour dicter") logic.add(txt);
        document.getElementById('status').innerText = "Maintenir pour dicter";
    };
}

const m = document.getElementById('mic');
m.onmousedown = m.ontouchstart = (e) => { e.preventDefault(); if(rec) rec.start(); };
m.onmouseup = m.ontouchend = () => { if(rec) rec.stop(); };

logic.render();
</script>
</body>
</html>
