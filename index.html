<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NURSE ASSIST • ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        #scroll-zone { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 100px; }
        #scroll-zone::-webkit-scrollbar { display: none; }
        .card { background: var(--card); border: 1px solid #1f1f1f; border-radius: 20px; padding: 18px; position: relative; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .patient-input { width: 100%; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 9999px; padding: 8px 14px; font-size: 14px; font-weight: 700; color: #60a5fa; outline: none; }
        textarea { background: transparent; width: 100%; border: 1px solid transparent; outline: none; color: #e5e7eb; font-size: 15.5px; line-height: 1.6; resize: none; margin-top: 10px; overflow: hidden; border-radius: 8px; padding: 4px; }
        .orb { width: 92px; height: 92px; border-radius: 50%; background: #fff; color: #000; font-size: 26px; border: none; touch-action: manipulation; transition: 0.25s; display: flex; align-items: center; justify-content: center; z-index: 50; }
        .recording { background: #ef4444 !important; color: white !important; box-shadow: 0 0 60px #ef4444 !important; transform: scale(1.1); }
        .side-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    </style>
</head>
<body>

    <header class="p-5 flex flex-col gap-4 border-b border-white/5 bg-black">
        <div class="flex justify-between items-center">
            <div onclick="logic.adminTrigger()">
                <h1 class="text-2xl font-black italic tracking-tighter text-blue-600 leading-none select-none uppercase">Nurse Assist</h1>
                <p class="text-[9px] font-bold opacity-30 uppercase tracking-[0.2em] mt-1 italic">Souveraineté des données</p>
            </div>
            <button onclick="logic.exportAll()" class="bg-blue-600 px-5 py-2 rounded-full text-[10px] font-black uppercase active:scale-95 transition">Exporter</button>
        </div>
    </header>

    <div id="scroll-zone"></div>

    <div class="p-6 bg-zinc-950 border-t border-white/5">
        <div class="flex flex-col items-center gap-5">
            <div id="status" class="text-[11px] font-black italic tracking-[0.2em] text-zinc-400 uppercase text-center">Maintenir pour parler</div>

            <div class="flex items-center justify-between w-full max-w-sm px-4">
                <button onclick="logic.addSoin('')" class="side-btn">⌨️</button>
                <button id="mic" class="orb">🎤</button>
                <button onclick="logic.share()" class="side-btn">📤</button>
            </div>
            
            <button id="reset-btn" onclick="logic.openResetModal()" class="hidden text-[8px] font-black uppercase text-red-500 border border-red-500/40 px-6 py-2 rounded-lg bg-red-500/5">
                EFFACER LA JOURNÉE
            </button>
        </div>
    </div>

    <div id="reset-modal" class="modal-overlay">
        <div class="bg-zinc-900 p-8 rounded-[32px] text-center border border-white/10 max-w-xs">
            <h2 class="text-red-500 font-black uppercase text-sm">Sécurité</h2>
            <p class="text-[10px] opacity-60 my-4">Tapez <b>EFFACER</b> pour tout purger.</p>
            <input type="text" id="confirm-input" class="w-full bg-black border border-white/10 rounded-xl p-3 text-center text-red-500 font-bold mb-4 outline-none">
            <div class="flex gap-2">
                <button onclick="logic.confirmReset()" class="flex-1 bg-red-600 py-3 rounded-xl text-[10px] font-black">VALIDER</button>
                <button onclick="logic.closeResetModal()" class="flex-1 bg-zinc-800 py-3 rounded-xl text-[10px] font-black">ANNULER</button>
            </div>
        </div>
    </div>

<script>
const DB_KEY = "nurse_v14_final";
let state = JSON.parse(localStorage.getItem(DB_KEY) || '{"notes":[]}');

const logic = {
    addSoin(text) {
        const n = { id: Date.now(), patient: "PATIENT", text: text, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) };
        state.notes.unshift(n);
        this.save(); this.render();
    },
    update(id, field, val) {
        const n = state.notes.find(x => x.id === id);
        if(n) { n[field] = val; this.save(); }
    },
    delete(id) {
        if(confirm("Supprimer cette note ?")) {
            state.notes = state.notes.filter(x => x.id !== id);
            this.save(); this.render();
        }
    },
    save() { localStorage.setItem(DB_KEY, JSON.stringify(state)); },
    render() {
        const zone = document.getElementById('scroll-zone');
        zone.innerHTML = state.notes.length ? '' : '<p class="text-center opacity-20 py-20 uppercase font-black tracking-widest">Journal vide</p>';
        state.notes.forEach(n => {
            const div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <input class="patient-input" value="${n.patient}" oninput="logic.update(${n.id}, 'patient', this.value)">
                    <span class="text-[10px] opacity-30 font-mono">${n.time}</span>
                </div>
                <textarea oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';logic.update(${n.id}, 'text', this.value)">${n.text}</textarea>
                <button onclick="logic.delete(${n.id})" class="text-[9px] font-bold text-red-900/60 uppercase mt-2">Supprimer</button>
            `;
            zone.appendChild(div);
            const tx = div.querySelector('textarea');
            tx.style.height = tx.scrollHeight + 'px';
        });
    },
    exportAll() {
        if(!state.notes.length) return;
        let report = `📋 COMPTE-RENDU NURSE ASSIST - ${new Date().toLocaleDateString()}\n\n`;
        state.notes.forEach(n => { report += `[${n.time}] ${n.patient} : ${n.text}\n\n`; });
        navigator.clipboard.writeText(report);
        alert("✅ VISUALIZER : Journal de tournée copié !");
    },
    share() {
        if(!state.notes.length) return;
        navigator.share({ text: state.notes[0].text }).catch(()=>{});
    },
    // ADMIN
    clicks: 0,
    adminTrigger() {
        this.clicks++;
        if(this.clicks === 3) { document.getElementById('reset-btn').classList.remove('hidden'); setTimeout(()=>this.clicks=0, 5000); }
    },
    openResetModal() { document.getElementById('reset-modal').style.display='flex'; },
    closeResetModal() { document.getElementById('reset-modal').style.display='none'; },
    confirmReset() {
        if(document.getElementById('confirm-input').value === "EFFACER") {
            state.notes = []; this.save(); this.render(); this.closeResetModal();
        }
    }
};

/** MOTEUR VOCAL **/
let rec = null;
const API = window.SpeechRecognition || window.webkitSpeechRecognition;
if (API) {
    rec = new API();
    rec.lang = 'fr-FR';
    rec.interimResults = true;
    rec.onstart = () => { document.getElementById('mic').classList.add('recording'); document.getElementById('status').innerText = "Écoute..."; };
    rec.onresult = (e) => {
        let str = "";
        for (let i = e.resultIndex; i < e.results.length; i++) { str += e.results[i][0].transcript; }
        document.getElementById('status').innerText = "→ " + str;
    };
    rec.onend = () => {
        document.getElementById('mic').classList.remove('recording');
        const final = document.getElementById('status').innerText.replace("→ ", "");
        if(final.length > 3 && final !== "Écoute...") logic.addSoin(final);
        document.getElementById('status').innerText = "Maintenir pour parler";
    };
}

const mic = document.getElementById('mic');
const start = (e) => { e.preventDefault(); if(rec) try { rec.start(); } catch(err){} };
const stop = () => { if(rec) rec.stop(); };
mic.onmousedown = start; mic.onmouseup = stop;
mic.ontouchstart = start; mic.ontouchend = stop;

logic.render();
</script>
</body>
</html>
