<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NURSE ASSIST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        #scroll-zone { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        #scroll-zone::-webkit-scrollbar { display: none; }
        
        .card { background: var(--card); border: 1px solid #1f1f1f; border-radius: 20px; padding: 18px; position: relative; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .patient-input { width: 100%; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 9999px; padding: 8px 14px; font-size: 14px; font-weight: 700; color: #60a5fa; outline: none; }
        
        textarea { background: transparent; width: 100%; border: 1px solid transparent; outline: none; color: #e5e7eb; font-size: 15.5px; line-height: 1.6; resize: none; margin-top: 10px; overflow: hidden; border-radius: 8px; padding: 4px; transition: border 0.2s, background 0.2s; }
        textarea:focus { border-color: rgba(59,130,246,0.3); background: rgba(255,255,255,0.02); }

        .orb { width: 92px; height: 92px; border-radius: 50%; background: #fff; color: #000; font-size: 26px; border: none; touch-action: manipulation; transition: 0.25s; display: flex; align-items: center; justify-content: center; z-index: 50; }
        .recording { background: #ef4444 !important; color: white !important; box-shadow: 0 0 60px #ef4444 !important; transform: scale(1.1); }
        
        .side-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; }
        .side-btn:active { background: rgba(255,255,255,0.2); transform: scale(0.9); }

        .template-btn { font-size: 9px; padding: 6px 14px; border-radius: 9999px; background: rgba(255,255,255,0.05); color: #93c5fd; border: 1px solid rgba(255,255,255,0.1); font-weight: 800; text-transform: uppercase; }
        .confidential-banner { background: #064e3b; color: #6ee7b7; border: 1px solid #059669; font-size: 10px; font-weight: 800; padding: 6px 16px; border-radius: 12px; text-align: center; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-content { background: #111; border: 1px solid #333; border-radius: 24px; padding: 24px; width: 100%; max-width: 320px; text-align: center; }
        .modal-input { background: #000; border: 1px solid #444; border-radius: 12px; padding: 12px; width: 100%; text-align: center; color: #ef4444; font-weight: 900; letter-spacing: 2px; margin: 15px 0; outline: none; }
    </style>
</head>
<body>

    <header class="p-5 flex flex-col gap-4 border-b border-white/5 bg-black">
        <div class="flex justify-between items-center">
            <div onclick="admin.trigger()">
                <h1 id="logo" class="text-2xl font-black italic tracking-tighter text-blue-600 leading-none select-none uppercase">Nurse Assist</h1>
                <p class="text-[9px] font-bold opacity-30 uppercase tracking-[0.2em] mt-1 italic">Données sécurisées localement</p>
            </div>
            <button onclick="actions.exportAll()" class="bg-blue-600 px-5 py-2 rounded-full text-[10px] font-black uppercase active:scale-95 transition">Exporter</button>
        </div>
        <div class="confidential-banner text-[9px]">🔒 AUCUN ENVOI EXTERNE : Vos notes restent dans ce téléphone</div>
    </header>

    <div id="scroll-zone"></div>

    <div class="p-6 bg-zinc-950 border-t border-white/5">
        <div class="flex flex-col items-center gap-5">
            <div class="text-[11px] font-black italic tracking-[0.2em] text-zinc-400 uppercase text-center">Maintenir pour parler - Cliquer pour écrire</div>

            <div class="flex flex-wrap gap-2 justify-center">
                <button onclick="actions.addTemplate(0)" class="template-btn">Transmission</button>
                <button onclick="actions.addTemplate(1)" class="template-btn">Constantes</button>
                <button onclick="actions.addTemplate(2)" class="template-btn">Pansement</button>
            </div>

            <div id="status" class="text-[9px] font-bold tracking-[0.15em] opacity-40 uppercase text-center">Appuyez 3 fois sur NURSE ASSIST pour effacer la journée</div>

            <div class="flex items-center justify-between w-full max-w-sm px-4">
                <button onclick="actions.add('')" class="side-btn">⌨️</button>
                <button id="mic" class="orb"><span>🎤</span></button>
                <button onclick="actions.shareLastNote()" class="side-btn">📤</button>
            </div>
            
            <button id="reset-btn" onclick="actions.openResetModal()" class="hidden text-[8px] font-black uppercase text-red-500 border border-red-500/40 px-6 py-2 rounded-lg bg-red-500/5 mt-2">
                Confirmer l'effacement total
            </button>
        </div>
    </div>

    <div id="reset-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-red-500 font-black uppercase text-sm tracking-tighter">Sécurité Critique</h2>
            <p class="text-[10px] opacity-60 mt-2 leading-relaxed">Supprimer toutes les notes de la journée ?</p>
            <input type="text" id="confirm-input" class="modal-input" placeholder="Taper EFFACER" spellcheck="false" autocomplete="off">
            <div class="flex gap-2">
                <button onclick="actions.confirmReset()" class="flex-1 bg-red-600 py-3 rounded-xl text-[10px] font-black uppercase">Valider</button>
                <button onclick="actions.closeResetModal()" class="flex-1 bg-zinc-800 py-3 rounded-xl text-[10px] font-black uppercase">Annuler</button>
            </div>
        </div>
    </div>

<script>
/** ---------------- CONFIG ---------------- */
const DB_KEY = "nurse_assist_v14";
let state = { notes: [] };
const save = () => { try { localStorage.setItem(DB_KEY, JSON.stringify(state)); } catch(e) {} };

/** ---------------- ADMIN (3 CLICS) ---------------- */
let clickCount = 0;
let adminTimeout;
const admin = {
    trigger() {
        clickCount++;
        if (clickCount === 3) {
            document.getElementById('reset-btn').classList.remove('hidden');
            document.getElementById('status').innerText = "BOUTON D'EFFACEMENT ACTIF";
            document.getElementById('status').classList.add('text-red-500');
            clearTimeout(adminTimeout);
            adminTimeout = setTimeout(() => { this.hide(); }, 8000);
            clickCount = 0;
        }
    },
    hide() {
        document.getElementById('reset-btn').classList.add('hidden');
        document.getElementById('status').innerText = "Appuyez 3 fois sur NURSE ASSIST pour effacer la journée";
        document.getElementById('status').classList.remove('text-red-500');
        clickCount = 0;
    }
};

/** ---------------- ACTIONS ---------------- */
const templates = [
    { title: "TRANSMISSION", text: "Situation :\nAntécédents :\nActions :\nRésultats :" },
    { title: "CONSTANTES", text: "TA : / mmHg\nFC : bpm\nGlycémie : g/L" },
    { title: "PANSEMENT", text: "Localisation :\nAspect :\nSoin réalisé :" }
];

const actions = {
    add(text, title = null) {
        const note = { id: crypto.randomUUID(), patient: "NOM PATIENT", title: title || `NOTE MANUELLE`, text: text, time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }), date: new Date().toLocaleDateString('fr-FR') };
        state.notes.unshift(note);
        save();
        render();
        setTimeout(() => {
            const tx = document.querySelector('textarea');
            if(tx) tx.focus();
        }, 100);
    },
    addTemplate(idx) { actions.add(templates[idx].text, templates[idx].title); document.getElementById('scroll-zone').scrollTo({top: 0, behavior: 'smooth'}); },
    update(id, field, value) { const n = state.notes.find(n => n.id === id); if (n) { n[field] = value; save(); } },
    delete(id) { if (confirm("Supprimer cette note ?")) { state.notes = state.notes.filter(n => n.id !== id); save(); render(); } },
    openResetModal() { document.getElementById('reset-modal').style.display = 'flex'; document.getElementById('confirm-input').focus(); },
    closeResetModal() { document.getElementById('reset-modal').style.display = 'none'; document.getElementById('confirm-input').value = ''; },
    confirmReset() {
        if (document.getElementById('confirm-input').value === "EFFACER") {
            state.notes = []; save(); render(); this.closeResetModal(); admin.hide();
        } else { alert("Mot incorrect."); }
    },
    exportAll() {
        if (!state.notes.length) return alert("Rien à exporter.");

        const promptSysteme = `Tu es un agent de synthèse clinique. 
        Règles : Regroupe par patient, place les alertes en haut, nettoie le jargon. 
        Format : [HEURE] - [NOM] - [SITUATION]`;

        let exportText = `📋 JOURNAL DE TOURNÉE - ${new Date().toLocaleDateString('fr-FR')}\n`;
        exportText += `Généré par l'Agent Visualizer\n`;
        exportText += `──────────────────────────────\n\n`;

        const notesTriees = [...state.notes].sort((a, b) => a.patient.localeCompare(b.patient));

        notesTriees.forEach(n => {
            exportText += `📍 ${n.patient} (${n.time})\n`;
            exportText += `📝 ${n.text}\n`;
            exportText += `──────────────────────────────\n`;
        });

        navigator.clipboard.writeText(exportText).then(() => {
            alert("✅ AGENT VISUALIZER : Rapport de journée généré et copié !");
        });
    }, // <-- L'ACCOLADE QUI MANQUAIT EST ICI
    async shareLastNote() {
        if (!state.notes.length) return;
        const n = state.notes[0];
        try { await navigator.share({ text: `[${n.patient}] ${n.text}` }); } catch(e) {}
    }
};

/** ---------------- RENDER ---------------- */
function render() {
    const zone = document.getElementById('scroll-zone');
    zone.innerHTML = '';
    state.notes.forEach(note => {
        const card = document.createElement('div');
        card.className = "card";
        card.innerHTML = `<div class="flex justify-between items-center mb-3"><input type="text" class="patient-input" value="${note.patient}" spellcheck="false"><span class="text-[9px] font-mono opacity-30 ml-2">${note.time}</span></div><div class="text-[9px] font-black text-blue-500/50 mb-1 uppercase tracking-widest">${note.title}</div><textarea spellcheck="false" placeholder="Écrire ici...">${note.text}</textarea><div class="flex gap-4 mt-3 pt-3 border-t border-white/5"><button data-action="copy" data-text="${note.text.replace(/"/g, '&quot;')}" class="text-[9px] font-bold opacity-30 hover:opacity-100 uppercase transition-all">Copier</button><button data-action="delete" data-id="${note.id}" class="text-[9px] font-bold text-red-900/60 hover:text-red-500 uppercase ml-auto transition-all">Effacer</button></div>`;
        const input = card.querySelector('input');
        const textarea = card.querySelector('textarea');
        input.oninput = (e) => actions.update(note.id, 'patient', e.target.value);
        const adj = (el) => { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };
        textarea.oninput = (e) => { adj(e.target); actions.update(note.id, 'text', e.target.value); };
        card.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            if (btn.dataset.action === 'copy') { navigator.clipboard.writeText(btn.dataset.text); btn.innerText = "COPIÉ"; setTimeout(() => btn.innerText = "COPIER", 1000); }
            if (btn.dataset.action === 'delete') actions.delete(btn.dataset.id);
        });
        zone.appendChild(card);
        adj(textarea);
    });
}

/** ---------------- ORBE CONNECTÉ ---------------- */
let rec = null; let isRecording = false; let finalStr = "";
if (window.SpeechRecognition || window.webkitSpeechRecognition) {
    const API = window.SpeechRecognition || window.webkitSpeechRecognition;
    rec = new API(); rec.lang = 'fr-FR'; rec.interimResults = true;
    rec.onstart = () => { 
        isRecording = true; 
        document.getElementById('mic').classList.add('recording'); 
        document.getElementById('mic').querySelector('span').innerText = '●'; 
        finalStr = ""; 
    };
    rec.onresult = (e) => {
        let interim = ""; 
        for (let i = e.resultIndex; i < e.results.length; i++) { 
            if (e.results[i].isFinal) finalStr += e.results[i][0].transcript + " "; 
            else interim = e.results[i][0].transcript; 
        }
        document.getElementById('status').innerText = interim ? "→ " + interim : "Écoute...";
    };
    rec.onend = () => {
        isRecording = false; 
        document.getElementById('mic').classList.remove('recording'); 
        document.getElementById('mic').querySelector('span').innerText = '🎤';
        if (finalStr.trim().length > 2) actions.add(finalStr.trim());
        setTimeout(() => { if(document.getElementById('reset-btn').classList.contains('hidden')) { document.getElementById('status').innerText = "Appuyez 3 fois sur NURSE ASSIST pour effacer la journée"; } }, 2000);
    };
    rec.onerror = () => { isRecording = false; document.getElementById('mic').classList.remove('recording'); };
}
const mic = document.getElementById('mic');
const startAction = (e) => { e.preventDefault(); if(rec && !isRecording) rec.start(); };
const stopAction = () => { if(rec && isRecording) rec.stop(); };
mic.addEventListener('mousedown', startAction); mic.addEventListener('mouseup', stopAction); mic.addEventListener('touchstart', startAction); mic.addEventListener('touchend', stopAction);

const raw = localStorage.getItem(DB_KEY); if (raw) state = JSON.parse(raw);
render();
</script>
</body>
</html>
