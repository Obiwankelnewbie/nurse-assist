<script>
const DB_KEY = "nurse_v14_final_fix";
let state = { notes: [] };
const save = () => { localStorage.setItem(DB_KEY, JSON.stringify(state)); };

// --- ACTIONS ---
const actions = {
    add(text) {
        if (!text || text.length < 2) return;
        const note = { id: crypto.randomUUID(), patient: "PATIENT", text: text, time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) };
        state.notes.unshift(note);
        save();
        render();
    },
    update(id, field, value) { 
        const n = state.notes.find(n => n.id === id); 
        if (n) { n[field] = value; save(); } 
    },
    exportAll() {
        if (!state.notes.length) return alert("Rien à exporter.");
        let txt = `📋 TOURNEE DU ${new Date().toLocaleDateString()}\n`;
        state.notes.forEach(n => { txt += `\n[${n.time}] PATIENT: ${n.patient}\nNote: ${n.text}\n---`; });
        navigator.clipboard.writeText(txt);
        document.getElementById('export-area').value = txt;
        document.getElementById('export-modal').style.display = 'flex';
    }
};

function render() {
    const zone = document.getElementById('scroll-zone');
    zone.innerHTML = '';
    state.notes.forEach(note => {
        const card = document.createElement('div');
        card.className = "card";
        card.innerHTML = `<input type="text" class="patient-input" value="${note.patient}" oninput="actions.update('${note.id}', 'patient', this.value)"><textarea oninput="actions.update('${note.id}', 'text', this.value)">${note.text}</textarea>`;
        zone.appendChild(card);
    });
}

/** 🎤 MOTEUR VOCAL RE-BLINDÉ POUR MOBILE **/
let rec = null;
const API = window.SpeechRecognition || window.webkitSpeechRecognition;

function initSpeech() {
    if (!API) {
        alert("Ce navigateur ne supporte pas la dictée vocale.");
        return;
    }
    rec = new API();
    rec.lang = 'fr-FR';
    rec.interimResults = true;
    rec.continuous = false; // Important pour mobile

    rec.onstart = () => {
        document.getElementById('mic').classList.add('recording');
        document.getElementById('status').innerText = "ÉCOUTE EN COURS...";
    };

    rec.onresult = (e) => {
        let str = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
            str += e.results[i][0].transcript;
        }
        document.getElementById('status').innerText = "→ " + str;
    };

    rec.onerror = (e) => {
        console.error(e);
        if (e.error === 'service-not-allowed') {
            alert("ERREUR : Accès système refusé. Vérifiez les réglages Micro de votre téléphone pour ce navigateur.");
        }
        document.getElementById('status').innerText = "ERREUR : " + e.error;
        document.getElementById('mic').classList.remove('recording');
    };

    rec.onend = () => {
        document.getElementById('mic').classList.remove('recording');
        const final = document.getElementById('status').innerText.replace("→ ", "");
        if (final.length > 3 && final !== "ÉCOUTE EN COURS...") {
            actions.add(final);
        }
        document.getElementById('status').innerText = "Maintenir pour parler";
    };
}

const mic = document.getElementById('mic');
// Force l'initialisation au premier contact
const handleStart = (e) => {
    e.preventDefault();
    if (!rec) initSpeech();
    try { rec.start(); } catch(err) { console.log("Déjà lancé"); }
};

mic.addEventListener('mousedown', handleStart);
mic.addEventListener('mouseup', () => rec && rec.stop());
mic.addEventListener('touchstart', handleStart);
mic.addEventListener('touchend', () => rec && rec.stop());

const raw = localStorage.getItem(DB_KEY);
if (raw) state = JSON.parse(raw);
render();
</script>
